<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Sync Reader</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            background-color: #121212 !important; 
            color: #ffffff !important; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        #status { color: #f1c40f; margin-bottom: 20px; font-weight: bold; min-height: 1.2em; }
        
        /* 재생 바 스타일 */
        .player-bar {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #3498db;
            font-size: 1.2rem;
            width: 100px;
            padding: 8px;
            border-radius: 20px;
            text-align: center;
            outline: none;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        .btn {
            background: #222;
            border: none;
            color: #444;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn.active { background: #333; color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .btn-s.active { color: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status">코드를 입력하고 엔터를 누르세요</div>
        
        <div class="player-bar">
            <input type="text" id="code" placeholder="CODE" maxlength="6" onkeydown="if(event.keyCode==13) connect()">
            <div class="controls">
                <button id="btn-A" class="btn" onclick="send('A')">◁</button>
                <button id="btn-S" class="btn btn-s" onclick="send('S')">II</button>
                <button id="btn-D" class="btn" onclick="send('D')">▷</button>
                <button id="btn-W" class="btn" onclick="send('W')">↻</button>
            </div>
        </div>
        <p style="font-size: 0.8rem; color: #555; margin-top: 20px;">키보드 A, S, D, W 키를 사용하세요.</p>
    </div>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        let dc;

        async function connect() {
            const code = document.getElementById('code').value;
            if(!code) return alert("코드를 입력하세요.");
            
            const topic = `p2p_reading/${code}`;
            const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
            
            document.getElementById('status').innerText = "연결 시도 중 (호스트 응답 대기)...";

            client.on('connect', () => {
                client.subscribe(topic);
                client.publish(topic, JSON.stringify({type: "join"}));
            });

            client.on('message', async (t, msg) => {
                const data = JSON.parse(msg.toString());
                if (data.type === "offer") {
                    await pc.setRemoteDescription(new RTCSessionDescription(data));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    setTimeout(() => {
                        client.publish(topic, JSON.stringify({type: "answer", sdp: pc.localDescription.sdp, type: "answer"}));
                    }, 1000);
                }
            });
        }

        pc.ondatachannel = (e) => {
            dc = e.channel;
            dc.onopen = () => {
                document.getElementById('status').innerText = "● 연결 완료 (CONNECTED)";
                document.getElementById('status').style.color = "#2ecc71";
            };
        };

        function send(key) {
            if (dc && dc.readyState === 'open') {
                dc.send(JSON.stringify({key: key}));
                visualize(key);
            }
        }

        function visualize(key) {
            if(key === 'W') { resetUI(); return; }
            const btn = document.getElementById('btn-' + key);
            btn.classList.add('active');
            if(key === 'S') setTimeout(resetUI, 1000);
        }

        function resetUI() {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        }

        window.addEventListener('keydown', (e) => {
            const k = e.key.toUpperCase();
            if(['A','S','D','W'].includes(k)) send(k);
        });
    </script>
</body>
</html>
