<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reading Sync - Reader</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { max-width: 340px; margin: auto; padding: 20px; }
        input { width: 80%; padding: 15px; font-size: 1.5rem; background: #333; border: 1px solid #444; color: #3498db; border-radius: 8px; text-align: center; margin: 20px 0; }
        .status { color: #f1c40f; font-size: 0.9rem; margin-bottom: 20px; }
        .indicator-box { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .indicator { width: 80px; height: 80px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; border-radius: 4px; }
        .active { background: #f1c40f; color: black; }
        .btn-main { width: 100%; padding: 15px; background: #2ecc71; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .s-btn { background: #e74c3c; margin-top: 20px; width: 100%; padding: 20px; border-radius: 8px; border: none; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div id="status" class="status">● 호스트의 6자리 코드를 입력하세요</div>
        <input type="text" id="code" placeholder="000000" maxlength="6">
        <button onclick="connect()" class="btn-main">연결하기</button>

        <div class="indicator-box" style="margin-top: 40px;">
            <div id="ind-h" class="indicator">H</div>
            <div id="ind-r" class="indicator">R</div>
        </div>

        <button class="s-btn" onclick="send('S')">S (이해 불가 / 중단)</button>
        <p style="color: #666; font-size: 0.8rem; margin-top: 20px;">키보드 A, S, D, W로도 조작 가능합니다.</p>
    </div>

    <script>
        // 연결 성공률을 높이기 위한 구글 STUN 설정
        const pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });
        let dc;

        async function connect() {
            const code = document.getElementById('code').value;
            const topic = `p2p_reading/${code}`;
            const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
            
            document.getElementById('status').innerText = "● 호스트 찾는 중...";

            client.on('connect', () => {
                client.subscribe(topic);
            });

            client.on('message', async (t, msg) => {
                const data = JSON.parse(msg.toString());
                if (data.type === "offer") {
                    await pc.setRemoteDescription(new RTCSessionDescription(data));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    client.publish(topic, JSON.stringify({type: "answer", sdp: pc.localDescription.sdp, type: "answer"}));
                }
            });
        }

        pc.ondatachannel = (e) => {
            dc = e.channel;
            dc.onopen = () => {
                document.getElementById('status').innerText = "● 연결 완료";
                document.getElementById('status').style.color = "#2ecc71";
            };
        };

        function send(key) {
            if (dc && dc.readyState === 'open') {
                dc.send(JSON.stringify({key: key}));
                if(key === 'W' || key === 'S') {
                    resetUI();
                } else {
                    document.getElementById('ind-r').innerText = 'R: ' + key;
                    document.getElementById('ind-r').classList.add('active');
                }
            }
        }

        function resetUI() {
            document.getElementById('ind-r').innerText = 'R';
            document.getElementById('ind-r').classList.remove('active');
        }

        window.addEventListener('keydown', (e) => {
            const k = e.key.toUpperCase();
            if(['A','S','D','W'].includes(k)) send(k);
        });
    </script>
</body>
</html>
