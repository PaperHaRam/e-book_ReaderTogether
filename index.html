<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Reader Bar</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        #status { margin-bottom: 30px; font-size: 0.8rem; letter-spacing: 3px; color: #444; font-weight: bold; }
        .capsule { 
            background: #161616; padding: 35px 60px; border-radius: 100px; 
            display: flex; align-items: center; gap: 45px; box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            border: 1px solid #222;
        }
        input { 
            background: transparent; border: none; border-bottom: 2px solid #333; 
            color: #00d2ff; font-size: 1.6rem; width: 110px; text-align: center; outline: none; font-family: 'Consolas';
        }
        .controls { display: flex; gap: 30px; border-left: 1px solid #222; padding-left: 45px; }
        .unit { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .led { width: 40px; height: 4px; background: #222; border-radius: 2px; transition: 0.3s; }
        .btn { 
            background: none; border: none; color: #222; font-size: 3rem; 
            cursor: pointer; transition: 0.3s; padding: 0; line-height: 1;
        }
        /* Neon Colors */
        .h-on { background: #00d2ff !important; box-shadow: 0 0 12px #00d2ff; }
        .r-on { background: #2ecc71 !important; box-shadow: 0 0 12px #2ecc71; }
        .active-txt { color: #eee !important; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
        .s-alert { color: #ff4757 !important; text-shadow: 0 0 20px #ff4757; }
    </style>
</head>
<body>
    <div id="status">WAITING FOR CONNECTION</div>
    
    <div class="capsule">
        <input type="text" id="code" placeholder="000000" maxlength="6" onkeydown="if(event.keyCode==13) connect()">
        
        <div class="controls">
            <div class="unit">
                <div id="h-led-A" class="led"></div>
                <button id="btn-A" class="btn" onclick="send('A')">◁</button>
                <div id="r-led-A" class="led"></div>
            </div>
            <div class="unit">
                <div id="h-led-S" class="led"></div>
                <button id="btn-S" class="btn" onclick="send('S')">II</button>
                <div id="r-led-S" class="led"></div>
            </div>
            <div class="unit">
                <div id="h-led-D" class="led"></div>
                <button id="btn-D" class="btn" onclick="send('D')">▷</button>
                <div id="r-led-D" class="led"></div>
            </div>
            <div class="unit">
                <div id="h-led-W" class="led"></div>
                <button id="btn-W" class="btn" onclick="send('W')">↻</button>
                <div id="r-led-W" class="led"></div>
            </div>
        </div>
    </div>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        let dc;

        async function connect() {
            const code = document.getElementById('code').value;
            const topic = `p2p_reading/${code}`;
            const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
            document.getElementById('status').innerText = "HANDSHAKING...";

            client.on('connect', () => {
                client.subscribe(topic);
                client.publish(topic, JSON.stringify({type: "join"}));
            });

            client.on('message', async (t, msg) => {
                const data = JSON.parse(msg.toString());
                if (data.type === "offer") {
                    await pc.setRemoteDescription(new RTCSessionDescription(data));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    setTimeout(() => {
                        client.publish(topic, JSON.stringify({type: "answer", sdp: pc.localDescription.sdp, type: "answer"}));
                    }, 1000);
                }
            });
        }

        pc.ondatachannel = (e) => {
            dc = e.channel;
            dc.onopen = () => { 
                document.getElementById('status').innerText = "SYSTEM SYNCHRONIZED"; 
                document.getElementById('status').style.color = "#2ecc71";
            };
            dc.onmessage = (e) => {
                const data = JSON.parse(e.data);
                // 핵심: 호스트로부터 RESET 신호를 받으면 모든 UI 초기화
                if(data.key === 'RESET') {
                    resetAll();
                } else {
                    updateUI(data.user, data.key);
                }
            };
        };

        function send(key) {
            if (dc && dc.readyState === 'open') {
                dc.send(JSON.stringify({user: 'reader', key: key}));
                updateUI('reader', key);
            }
        }

        function updateUI(user, key) {
            if(key === 'S') { 
                document.getElementById('btn-S').classList.add('s-alert');
                setTimeout(resetAll, 1200);
                return;
            }
            const led = document.getElementById((user === 'host' ? 'h-led-' : 'r-led-') + key);
            const btn = document.getElementById('btn-' + key);
            if(led && btn) {
                led.classList.add(user === 'host' ? 'h-on' : 'r-on');
                btn.classList.add('active-txt');
            }
        }

        function resetAll() {
            document.querySelectorAll('.led').forEach(l => { l.className = 'led'; });
            document.querySelectorAll('.btn').forEach(b => { b.className = 'btn'; });
        }

        window.addEventListener('keydown', (e) => {
            const k = e.key.toUpperCase();
            if(['A','S','D','W'].includes(k)) send(k);
        });
    </script>
</body>
</html>
