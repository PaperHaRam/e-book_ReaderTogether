<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reading Sync - Reader</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #1e1e1e; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { max-width: 320px; margin: auto; padding: 20px; }
        .status { color: #f1c40f; font-size: 0.9rem; margin-bottom: 20px; }
        input { width: 85%; padding: 15px; font-size: 1.8rem; background: #2d2d2d; border: 1px solid #333; color: #3498db; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .indicator-box { display: flex; justify-content: center; gap: 20px; margin: 40px 0; }
        .ind { width: 85px; height: 85px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; border-radius: 4px; }
        .active { background: #f1c40f; color: black; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-conn { background: #2ecc71; color: white; }
        .btn-s { background: #e74c3c; color: white; padding: 25px; margin-top: 30px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="card">
        <div id="status" class="status">● 6자리 코드를 입력하세요</div>
        <input type="text" id="code" placeholder="000000" maxlength="6">
        <button onclick="connect()" class="btn btn-conn">연결하기</button>

        <div class="indicator-box">
            <div id="ind-h" class="ind">H</div>
            <div id="ind-r" class="ind">R</div>
        </div>

        <button class="btn btn-s" onclick="send('S')">S (이해 불가 / 중단)</button>
    </div>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        let dc;

        async function connect() {
            const code = document.getElementById('code').value;
            if(code.length !== 6) return alert("6자리 코드를 입력하세요.");
            
            const topic = `p2p_reading/${code}`;
            const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
            
            document.getElementById('status').innerText = "● 호스트에게 신호 보내는 중...";

            client.on('connect', () => {
                client.subscribe(topic);
                // 리딩러가 접속했음을 알리는 'join' 신호를 먼저 보냄
                client.publish(topic, JSON.stringify({type: "join"}));
            });

            client.on('message', async (t, msg) => {
                const data = JSON.parse(msg.toString());
                if (data.type === "offer") {
                    await pc.setRemoteDescription(new RTCSessionDescription(data));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    // ICE gathering 완료를 위해 잠시 대기
                    setTimeout(() => {
                        client.publish(topic, JSON.stringify({type: "answer", sdp: pc.localDescription.sdp, type: "answer"}));
                    }, 1000);
                }
            });
        }

        pc.ondatachannel = (e) => {
            dc = e.channel;
            dc.onopen = () => {
                document.getElementById('status').innerText = "● 연결 완료";
                document.getElementById('status').style.color = "#2ecc71";
            };
        };

        function send(key) {
            if (dc && dc.readyState === 'open') {
                dc.send(jsonStr(key));
                if(key !== 'S' && key !== 'W') {
                    const r = document.getElementById('ind-r');
                    r.innerText = 'R: ' + key;
                    r.classList.add('active');
                }
            }
        }

        function jsonStr(k) { return JSON.stringify({key: k}); }

        window.addEventListener('keydown', (e) => {
            const k = e.key.toUpperCase();
            if(['A','S','D','W'].includes(k)) send(k);
        });
    </script>
</body>
</html>
