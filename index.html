<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Sync Reader</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; background: #121212; color: white; 
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        .player-bar { 
            background: #1e1e1e; padding: 25px 40px; border-radius: 60px; 
            display: flex; align-items: center; gap: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        input { 
            background: transparent; border: none; border-bottom: 2px solid #333; 
            color: #3498db; font-size: 1.3rem; width: 90px; text-align: center; outline: none;
        }
        .controls { display: flex; gap: 20px; border-left: 1px solid #333; padding-left: 30px; }
        .btn-unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .light { width: 30px; height: 6px; background: #222; border-radius: 3px; }
        .btn { 
            background: none; border: none; color: #333; font-size: 2.2rem; 
            cursor: pointer; transition: 0.2s; padding: 0;
        }
        /* 상태별 색상 */
        .h-active { background: #3498db !important; } /* 호스트: 파랑 */
        .r-active { background: #2ecc71 !important; } /* 리딩러: 녹색 */
        .main-active { color: #eee !important; }
        #status { position: absolute; top: 30px; color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">CODE 입력 후 ENTER</div>
    
    <div class="player-bar">
        <input type="text" id="code" placeholder="CODE" maxlength="6" onkeydown="if(event.keyCode==13) connect()">
        
        <div class="controls">
            <div class="btn-unit">
                <div id="h-A" class="light"></div>
                <button id="main-A" class="btn" onclick="send('A')">◁</button>
                <div id="r-A" class="light"></div>
            </div>
            <div class="btn-unit">
                <div id="h-S" class="light"></div>
                <button id="main-S" class="btn" onclick="send('S')">II</button>
                <div id="r-S" class="light"></div>
            </div>
            <div class="btn-unit">
                <div id="h-D" class="light"></div>
                <button id="main-D" class="btn" onclick="send('D')">▷</button>
                <div id="r-D" class="light"></div>
            </div>
            <div class="btn-unit">
                <div id="h-W" class="light"></div>
                <button id="main-W" class="btn" onclick="send('W')">↻</button>
                <div id="r-W" class="light"></div>
            </div>
        </div>
    </div>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        let dc;

        async function connect() {
            const code = document.getElementById('code').value;
            const topic = `p2p_reading/${code}`;
            const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
            document.getElementById('status').innerText = "호스트 찾는 중...";

            client.on('connect', () => {
                client.subscribe(topic);
                client.publish(topic, JSON.stringify({type: "join"}));
            });

            client.on('message', async (t, msg) => {
                const data = JSON.parse(msg.toString());
                if (data.type === "offer") {
                    await pc.setRemoteDescription(new RTCSessionDescription(data));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    setTimeout(() => {
                        client.publish(topic, JSON.stringify({type: "answer", sdp: pc.localDescription.sdp, type: "answer"}));
                    }, 1000);
                }
            });
        }

        pc.ondatachannel = (e) => {
            dc = e.channel;
            dc.onopen = () => { document.getElementById('status').innerText = "CONNECTED"; document.getElementById('status').style.color = "#2ecc71"; };
            // 중요: 호스트의 상태 변화도 웹에서 받아보고 싶다면 호스트가 메시지를 보내줘야 함 (현재는 입력 전송 위주)
        };

        function send(key) {
            if (dc && dc.readyState === 'open') {
                dc.send(JSON.stringify({key: key}));
                visualize('reader', key);
            }
        }

        function visualize(user, key) {
            if(key === 'W') { resetUI(); return; }
            
            const light = document.getElementById((user === 'host' ? 'h-' : 'r-') + key);
            const main = document.getElementById('main-' + key);
            
            light.classList.add(user === 'host' ? 'h-active' : 'r-active');
            main.classList.add('main-active');
            
            if(key === 'S') setTimeout(resetUI, 1000);
        }

        function resetUI() {
            document.querySelectorAll('.light').forEach(l => { l.classList.remove('h-active'); l.classList.remove('r-active'); });
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('main-active'));
        }

        window.addEventListener('keydown', (e) => {
            const k = e.key.toUpperCase();
            if(['A','S','D','W'].includes(k)) send(k);
        });
    </script>
</body>
</html>
