<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reading Sync Bar</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .player-bar { background: #1e1e1e; padding: 20px 40px; border-radius: 50px; display: flex; align-items: center; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { background: transparent; border: none; border-bottom: 2px solid #333; color: #3498db; font-size: 1.2rem; width: 80px; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-bottom-color: #3498db; }
        .controls { display: flex; gap: 15px; border-left: 1px solid #333; padding-left: 20px; }
        .btn { background: #222; border: none; color: #555; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn:active { transform: scale(0.9); }
        .btn.active { background: #333; color: #2ecc71; box-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
        .btn-s.active { color: #e74c3c; box-shadow: 0 0 15px rgba(231, 76, 60, 0.3); }
        #status { position: absolute; top: 20px; font-size: 0.8rem; color: #f1c40f; }
    </script>
</head>
<body>
    <div id="status">코드를 입력하고 ENTER를 누르세요</div>
    
    <div class="player-bar">
        <input type="text" id="code" placeholder="CODE" maxlength="6" onkeydown="if(event.keyCode==13) connect()">
        
        <div class="controls">
            <button id="btn-A" class="btn" onclick="send('A')">◁</button>
            <button id="btn-S" class="btn btn-s" onclick="send('S')">II</button>
            <button id="btn-D" class="btn" onclick="send('D')">▷</button>
            <button id="btn-W" class="btn" onclick="send('W')">↻</button>
        </div>
    </div>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        let dc;

        async function connect() {
            const code = document.getElementById('code').value;
            const topic = `p2p_reading/${code}`;
            const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
            
            document.getElementById('status').innerText = "접속 시도 중...";

            client.on('connect', () => {
                client.subscribe(topic);
                client.publish(topic, JSON.stringify({type: "join"})); // 호스트에게 알림
            });

            client.on('message', async (t, msg) => {
                const data = JSON.parse(msg.toString());
                if (data.type === "offer") {
                    await pc.setRemoteDescription(new RTCSessionDescription(data));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    setTimeout(() => {
                        client.publish(topic, JSON.stringify({type: "answer", sdp: pc.localDescription.sdp, type: "answer"}));
                    }, 1000);
                }
            });
        }

        pc.ondatachannel = (e) => {
            dc = e.channel;
            dc.onopen = () => {
                document.getElementById('status').innerText = "CONNECTED";
                document.getElementById('status').style.color = "#2ecc71";
            };
        };

        function send(key) {
            if (dc && dc.readyState === 'open') {
                dc.send(JSON.stringify({key: key}));
                visualize(key);
            }
        }

        function visualize(key) {
            if(key === 'W') {
                resetUI();
                return;
            }
            const btn = document.getElementById('btn-' + key);
            btn.classList.add('active');
            if(key === 'S') setTimeout(resetUI, 1000);
        }

        function resetUI() {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        }

        window.addEventListener('keydown', (e) => {
            const k = e.key.toUpperCase();
            if(['A','S','D','W'].includes(k)) send(k);
        });
    </script>
</body>
</html>
